<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#5b7cfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="1080" y2="0" transform="translate(0,180)"/>
    <line x1="0" y1="0" x2="1080" y2="0" transform="translate(0,360)"/>
    <line x1="0" y1="0" x2="1080" y2="0" transform="translate(0,540)"/>
    <line x1="0" y1="0" x2="1080" y2="0" transform="translate(0,720)"/>
    <line x1="0" y1="0" x2="1080" y2="0" transform="translate(0,900)"/>
    <line x1="0" y1="0" x2="0" y2="1080" transform="translate(180,0)"/>
    <line x1="0" y1="0" x2="0" y2="1080" transform="translate(360,0)"/>
    <line x1="0" y1="0" x2="0" y2="1080" transform="translate(540,0)"/>
    <line x1="0" y1="0" x2="0" y2="1080" transform="translate(720,0)"/>
    <line x1="0" y1="0" x2="0" y2="1080" transform="translate(900,0)"/>
  </g>

  <!-- Decorative accent line top -->
  <rect x="0" y="0" width="1080" height="4" fill="url(#accent)"/>

  <!-- Content -->
  <text x="540" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="72" fill="#ffffff" letter-spacing="-1">AI Automation</text>
  <text x="540" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="72" fill="#ffffff" letter-spacing="-1">Workshop</text>

  <!-- Tagline -->
  <text x="540" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="24" fill="#888888" letter-spacing="1">Build 3 working AI workflows in one day</text>

  <!-- Separator -->
  <rect x="490" y="590" width="100" height="2" fill="url(#accent)" rx="1"/>

  <!-- Date & Location -->
  <text x="540" y="640" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="28" fill="url(#accent)" letter-spacing="2">JULY 25, 2026</text>
  <text x="540" y="685" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="22" fill="#666666">Novare Mall · Abuja</text>

  <!-- Price -->
  <rect x="340" y="740" width="400" height="60" rx="30" fill="url(#accent)" opacity="0.15" stroke="url(#accent)" stroke-width="1"/>
  <text x="540" y="778" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="26" fill="url(#accent)">₦50,000 Early Bird · ₦55,000 Standard</text>

  <!-- Bottom TINC mark -->
  <text x="540" y="920" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#444444" letter-spacing="3">TINC WITH AI</text>
  <text x="540" y="945" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="9" fill="#333333" letter-spacing="2">THINGS I NOW CREATE WITH AI</text>

  <!-- Corner accent -->
  <rect x="1000" y="1030" width="40" height="40" rx="4" fill="url(#accent)" opacity="0.3"/>
</svg>
