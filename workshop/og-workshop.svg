  <!-- Details row -->
  <rect x="80" y="420" width="0.5" height="28" fill="#607d6b" opacity="0.5"/>
  <text x="92" y="440" fill="#96968e" font-family="Inter, sans-serif" font-weight="500" font-size="16">
