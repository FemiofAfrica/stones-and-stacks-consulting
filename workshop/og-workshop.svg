  <text x="60" y="66" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-weight="800" font-size="14" letter-spacing="-0.5">S&amp;S</text>

  <!-- Main title -->
  <text x="80" y="240" fill="#f6f4ef" font-family="Inter, sans-serif" font-weight="900" font-size="72" letter-spacing="-0.06em">
    AI Automation
  </text>
  <text x="80" y="310" fill="#f6f4ef" font-family="Inter, sans-serif" font-weight="900" font-size="72" letter-spacing="-0.06em">
    Workshop
  </text>

  <!-- Accent line -->
  <rect x="80" y="340" width="60" height="3" rx="1.5" fill="#607d6b"/>

  <!-- Subtitle -->
  <text x="80" y="380" fill="#a8a498" font-family="Inter, sans-serif" font-weight="600" font-size="22" letter-spacing="-0.02em">
