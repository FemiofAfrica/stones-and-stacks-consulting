  </text>
  <circle cx="310" cy="435" r="3" fill="#607d6b"/>
  <text x="325" y="440" fill="#96968e" font-family="Inter, sans-serif" font-weight="500" font-size="16">
    ₦55,000
  </text>

  <!-- Bottom site name -->
  <text x="80" y="580" fill="#4a4a44" font-family="Inter, sans-serif" font-weight="600" font-size="14" letter-spacing="0.08em" text-transform="uppercase">
