    <line x1="660" y1="0" x2="660" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="780" y1="0" x2="780" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="1020" y1="0" x2="1020" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="1140" y1="0" x2="1140" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="63" x2="1200" y2="63" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="126" x2="1200" y2="126" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="189" x2="1200" y2="189" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="441" x2="1200" y2="441" stroke="#fff" stroke-width="0.5"/>
